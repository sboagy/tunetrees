# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:line-length
#
# Secrets required in the `tunetrees_ci_env` environment:
#   OP_SERVICE_ACCOUNT_TOKEN  — 1Password Service Account token (for op run)
#
# All other secrets (including test user passwords, Supabase keys, Cloudflare creds)
# are resolved at runtime via `op run` or `op read` using .env.prod.template.
#
# All production secrets (CLOUDFLARE_*, VITE_SUPABASE_URL, etc.) are resolved
# at deploy time via `op run --env-file=".env.prod.template"` so they do NOT
# need to be stored individually as GitHub secrets.

name: CI - Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_staging_data_refresh:
        description: "Skip production-to-staging database refresh before staging smoke tests"
        type: boolean
        default: false

permissions:
  contents: read

# Opt into Node.js 24 for all JavaScript actions (required before June 2026 forced migration).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # vite-plugin-pwa@1.2.0 still advertises a Vite <=7 peer range even though
  # TuneTrees has been verified to install and build on Vite 8. Keep CI from
  # failing on that stale peer metadata until upstream updates it.
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

jobs:
  # --------------------------------------------------------------------------
  # JOB 0: STATIC QUALITY CHECKS
  # --------------------------------------------------------------------------
  quality:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    concurrency:
      group: ci-fast-quality-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Biome check
        run: npm run check

      - name: Install worker dependencies
        run: npm ci --prefix worker --ignore-scripts

      - name: Run typecheck
        run: npm run typecheck

  # --------------------------------------------------------------------------
  # JOB 1: UNIT TESTS (VITEST)
  # --------------------------------------------------------------------------
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality]
    environment: tunetrees_ci_env
    concurrency:
      group: ci-fast-unit-${{ github.ref }}
      cancel-in-progress: true
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build better-sqlite3 bindings
        run: npm rebuild better-sqlite3

      - name: Run unit tests
        run: npm run test

  # --------------------------------------------------------------------------
  # JOB 2: PLAYWRIGHT E2E TESTS (Sharded)
  # --------------------------------------------------------------------------
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: [quality]
    concurrency:
      group: ci-fast-e2e-${{ github.ref }}-${{ matrix.shard }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    timeout-minutes: 60
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      # These override anything from op run for the LOCAL Supabase instance.
      # Values are populated after `supabase start` via $GITHUB_ENV.
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      # Local Supabase service role key (well-known default, not a real secret)
      SUPABASE_SERVICE_ROLE_KEY: super-secret-jwt-token-with-at-least-32-characters-long

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Resolve shared repo refs
        id: shared_refs
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          has_remote_branch() {
            local repo="$1"
            local branch="$2"
            git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$branch" >/dev/null 2>&1
          }

          repo_prefix() {
            case "$1" in
              sboagy/tunetrees) printf 'tt' ;;
              sboagy/cubefsrs) printf 'cf' ;;
              sboagy/oosync) printf 'os' ;;
              sboagy/rhizome) printf 'rz' ;;
              *) return 1 ;;
            esac
          }

          resolve_ref() {
            local repo="$1"
            local candidate="$2"
            local target_prefix
            local shared_suffix
            local prefixed_candidate

            if has_remote_branch "$repo" "$candidate"; then
              printf '%s\n' "$candidate"
              return
            fi

            target_prefix="$(repo_prefix "$repo")" || {
              printf 'main\n'
              return
            }

            shared_suffix="$candidate"
            case "$candidate" in
              tt-*|cf-*|os-*|rz-*)
                shared_suffix="${candidate#*-}"
                ;;
            esac

            prefixed_candidate="${target_prefix}-${shared_suffix}"
            if has_remote_branch "$repo" "$prefixed_candidate"; then
              printf '%s\n' "$prefixed_candidate"
              return
            fi

            printf 'main\n'
          }

          echo "rhizome_ref=$(resolve_ref sboagy/rhizome "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"
          echo "oosync_ref=$(resolve_ref sboagy/oosync "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"

      - name: Checkout Rhizome (shared Supabase config + DB scripts)
        uses: actions/checkout@v5
        with:
          repository: sboagy/rhizome
          ref: ${{ steps.shared_refs.outputs.rhizome_ref }}
          path: rhizome
          # For private repos, add: token: ${{ secrets.GH_PAT }}

      - name: Checkout oosync (sync library for worker)
        uses: actions/checkout@v5
        with:
          repository: sboagy/oosync
          ref: ${{ steps.shared_refs.outputs.oosync_ref }}
          path: oosync
          # For private repos, add: token: ${{ secrets.GH_PAT }}

      - name: AGGRESSIVE DISK CLEANUP
        if: runner.os == 'Linux'
        run: |
          echo "🧹 Removing large pre-installed SDKs..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune -a -f || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Link checked-out Rhizome and oosync packages
        run: |
          # npm ci has installed the lockfile-resolved dependency graph. Link only
          # the checked-out shared package source so npm does not re-resolve its
          # transitive dependencies during this CI run.
          rm -rf node_modules/@rhizome/core node_modules/oosync
          ln -s "$GITHUB_WORKSPACE/rhizome" node_modules/@rhizome/core
          ln -s "$GITHUB_WORKSPACE/oosync" node_modules/oosync

      - name: Log shared package overlay versions
        run: |
          echo "rhizome source SHA: $(git -C rhizome rev-parse HEAD)"
          echo "oosync source SHA: $(git -C oosync rev-parse HEAD)"
          node -e '
            const fs = require("node:fs");
            for (const [packageName, manifestPath] of Object.entries({
              "@rhizome/core": "node_modules/@rhizome/core/package.json",
              oosync: "node_modules/oosync/package.json",
              "@supabase/supabase-js": "node_modules/@supabase/supabase-js/package.json",
              "@sqlite.org/sqlite-wasm": "node_modules/@sqlite.org/sqlite-wasm/package.json",
            })) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              console.log(`${packageName}: version=${manifest.version} manifest=${fs.realpathSync(manifestPath)}`);
            }
          '

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71

      - name: Resolve test secrets from 1Password
        # Resolves the shared test-user password via 1Password so it is never
        # stored as a GitHub secret. Both env vars point to the same value.
        run: |
          echo "ALICE_TEST_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
          echo "TEST_USER_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # --- Supabase Setup (from Rhizome — the shared multi-tenant instance) ---
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/supabase
            /usr/local/bin/supabase-go
          key: ${{ runner.os }}-supabase-cli-v2.106.0
          restore-keys: |
            ${{ runner.os }}-supabase-cli-v2.

      - name: Install Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "Supabase CLI install attempt $attempt/3..."
            rm -rf /tmp/supabase-cli && mkdir -p /tmp/supabase-cli
            if timeout 120 curl -fsSL --proto "=https" --tlsv1.2 \
                https://github.com/supabase/cli/releases/download/v2.106.0/supabase_2.106.0_linux_amd64.tar.gz \
                | tar -xz -C /tmp/supabase-cli \
              && test -x /tmp/supabase-cli/supabase \
              && test -x /tmp/supabase-cli/supabase-go; then
              echo "✅ Install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "⚠️ Install failed/timed out on attempt $attempt, retrying in 10s..."
              sleep 10
            else
              echo "❌ Install failed after 3 attempts"
              exit 1
            fi
          done
          sudo mv -f /tmp/supabase-cli/supabase /tmp/supabase-cli/supabase-go /usr/local/bin/
          rm -rf /tmp/supabase-cli

      - name: Cache Supabase Docker Images
        id: cache-docker-images
        uses: actions/cache@v5
        with:
          path: ~/supabase-docker-images.tar
          key: ${{ runner.os }}-supabase-docker-v2.106.0
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Load Cached Docker Images
        if: steps.cache-docker-images.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-docker-images.tar

      - name: Stop any stale Supabase containers
        working-directory: rhizome
        run: |
          supabase stop --no-backup 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

      - name: Disable Supabase Edge Runtime For CI
        working-directory: rhizome
        run: |
          if grep -q '^\[edge_runtime\]' supabase/config.toml; then
            perl -0pi -e 's/\[edge_runtime\]\s*\nenabled = true/[edge_runtime]\nenabled = false/' supabase/config.toml
          else
            printf '\n[edge_runtime]\nenabled = false\n' >> supabase/config.toml
          fi

      - name: Start Supabase from Rhizome
        # Starting from the rhizome directory uses rhizome's supabase/config.toml,
        # which defines the shared multi-tenant project. NEVER run `supabase db reset`
        # here — that would wipe ALL app schemas (TuneTrees + CubeFSRS).
        working-directory: rhizome
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Wait for Supabase API (Health Check)
        run: |
          echo "🔍 Checking Supabase API health at $SUPABASE_URL/rest/v1"
          ATTEMPTS=0
          until CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "$SUPABASE_URL/rest/v1" || true) && echo "$CODE" | grep -qE '200|401|404'; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then exit 1; fi
            sleep 2
          done

      - name: Save Docker Images to Cache
        if: steps.cache-docker-images.outputs.cache-hit != 'true'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep supabase | xargs docker save -o ~/supabase-docker-images.tar

      - name: Seed shared auth users (Rhizome)
        # Creates the shared test user accounts without touching app-specific tables.
        working-directory: rhizome
        run: |
          bash ./scripts/seed-shared-auth-users-local.sh
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Apply TuneTrees migrations + seeds (Rhizome db-push)
        # Applies TuneTrees-specific migrations and seeds via the rhizome orchestration
        # script, which is safe to run against the shared multi-tenant instance.
        working-directory: rhizome
        run: |
          ./scripts/db-push-local.sh --public-cleared ${{ github.workspace }}
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Remove local Supabase bindings from .env.local.template
        # Later npm scripts use `op run --env-file=.env.local.template`. Strip the
        # local Supabase-derived keys so `op run` cannot override the runtime values
        # already exported into $GITHUB_ENV after `supabase start`.
        run: |
          tmp_env_file="$(mktemp)"
          awk '!/^(VITE_SUPABASE_URL|SUPABASE_URL|SUPABASE_ANON_KEY|VITE_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY)=/' .env.local.template > "$tmp_env_file"
          mv "$tmp_env_file" .env.local.template

      - name: Check SQLite schema via Postgres introspection
        if: matrix.shard == 1
        run: npm run schema:sqlite:check

      # --- Playwright Setup ---
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        # Use the local playwright CLI from @playwright/test to guarantee the
        # binary hash matches the installed package version. Avoids stale-cache
        # false-positives that occur when npx downloads a separate copy and sees
        # no project context.
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Setup Cloudflare Worker
        run: |
          cd worker
          npm ci --ignore-scripts
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          echo "SUPABASE_URL=$SUPABASE_URL" > .dev.vars
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" >> .dev.vars
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> .dev.vars

      - name: Create Playwright output directories
        run: |
          mkdir -p playwright-logs blob-report test-results

      - name: Run Playwright Tests (Shard ${{ matrix.shard }}/4)
        run: |
          set -o pipefail
          echo "🎬 Running sharded test suite (shard ${{ matrix.shard }}/4)"
          npm run test:e2e:both:ci -- \
            --shard=${{ matrix.shard }}/4 \
            2>&1 | tee "playwright-logs/playwright-shard-${{ matrix.shard }}.log"

      - name: Upload Playwright log (Shard ${{ matrix.shard }}/4)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-log-${{ matrix.shard }}
          path: playwright-logs/playwright-shard-${{ matrix.shard }}.log
          retention-days: 7

      - name: Upload blob report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: cd rhizome && supabase stop --no-backup

  # --------------------------------------------------------------------------
  # JOB 3: PWA OFFLINE TEST (Production Build + Preview)
  # --------------------------------------------------------------------------
  test-pwa-offline:
    name: Run PWA Offline Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    concurrency:
      group: ci-fast-pwa-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      SUPABASE_SERVICE_ROLE_KEY: super-secret-jwt-token-with-at-least-32-characters-long

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Resolve shared repo refs
        id: shared_refs
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          has_remote_branch() {
            local repo="$1"
            local branch="$2"
            git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$branch" >/dev/null 2>&1
          }

          repo_prefix() {
            case "$1" in
              sboagy/tunetrees) printf 'tt' ;;
              sboagy/cubefsrs) printf 'cf' ;;
              sboagy/oosync) printf 'os' ;;
              sboagy/rhizome) printf 'rz' ;;
              *) return 1 ;;
            esac
          }

          resolve_ref() {
            local repo="$1"
            local candidate="$2"
            local target_prefix
            local shared_suffix
            local prefixed_candidate

            if has_remote_branch "$repo" "$candidate"; then
              printf '%s\n' "$candidate"
              return
            fi

            target_prefix="$(repo_prefix "$repo")" || {
              printf 'main\n'
              return
            }

            shared_suffix="$candidate"
            case "$candidate" in
              tt-*|cf-*|os-*|rz-*)
                shared_suffix="${candidate#*-}"
                ;;
            esac

            prefixed_candidate="${target_prefix}-${shared_suffix}"
            if has_remote_branch "$repo" "$prefixed_candidate"; then
              printf '%s\n' "$prefixed_candidate"
              return
            fi

            printf 'main\n'
          }

          echo "rhizome_ref=$(resolve_ref sboagy/rhizome "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"
          echo "oosync_ref=$(resolve_ref sboagy/oosync "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"

      - name: Checkout Rhizome (shared Supabase config + DB scripts)
        uses: actions/checkout@v5
        with:
          repository: sboagy/rhizome
          ref: ${{ steps.shared_refs.outputs.rhizome_ref }}
          path: rhizome

      - name: Checkout oosync (sync library for worker)
        uses: actions/checkout@v5
        with:
          repository: sboagy/oosync
          ref: ${{ steps.shared_refs.outputs.oosync_ref }}
          path: oosync

      - name: AGGRESSIVE DISK CLEANUP
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune -a -f || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Link checked-out Rhizome and oosync packages
        run: |
          # Preserve the dependency graph installed by npm ci; only replace the
          # checked-out shared package source used by this job.
          rm -rf node_modules/@rhizome/core node_modules/oosync
          ln -s "$GITHUB_WORKSPACE/rhizome" node_modules/@rhizome/core
          ln -s "$GITHUB_WORKSPACE/oosync" node_modules/oosync

      - name: Log shared package overlay versions
        run: |
          echo "rhizome source SHA: $(git -C rhizome rev-parse HEAD)"
          echo "oosync source SHA: $(git -C oosync rev-parse HEAD)"
          node -e '
            const fs = require("node:fs");
            for (const [packageName, manifestPath] of Object.entries({
              "@rhizome/core": "node_modules/@rhizome/core/package.json",
              oosync: "node_modules/oosync/package.json",
              "@supabase/supabase-js": "node_modules/@supabase/supabase-js/package.json",
              "@sqlite.org/sqlite-wasm": "node_modules/@sqlite.org/sqlite-wasm/package.json",
            })) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              console.log(`${packageName}: version=${manifest.version} manifest=${fs.realpathSync(manifestPath)}`);
            }
          '

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71

      - name: Resolve test secrets from 1Password
        # Resolves the shared test-user password via 1Password so it is never
        # stored as a GitHub secret. Both env vars point to the same value.
        run: |
          echo "ALICE_TEST_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
          echo "TEST_USER_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # --- Supabase Setup (from Rhizome — the shared multi-tenant instance) ---
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/supabase
            /usr/local/bin/supabase-go
          key: ${{ runner.os }}-supabase-cli-v2.106.0
          restore-keys: |
            ${{ runner.os }}-supabase-cli-v2.

      - name: Install Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "Supabase CLI install attempt $attempt/3..."
            rm -rf /tmp/supabase-cli && mkdir -p /tmp/supabase-cli
            if timeout 120 curl -fsSL --proto "=https" --tlsv1.2 \
                https://github.com/supabase/cli/releases/download/v2.106.0/supabase_2.106.0_linux_amd64.tar.gz \
                | tar -xz -C /tmp/supabase-cli \
              && test -x /tmp/supabase-cli/supabase \
              && test -x /tmp/supabase-cli/supabase-go; then
              echo "✅ Install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "⚠️ Install failed/timed out on attempt $attempt, retrying in 10s..."
              sleep 10
            else
              echo "❌ Install failed after 3 attempts"
              exit 1
            fi
          done
          sudo mv -f /tmp/supabase-cli/supabase /tmp/supabase-cli/supabase-go /usr/local/bin/
          rm -rf /tmp/supabase-cli

      - name: Cache Supabase Docker Images
        id: cache-docker-images
        uses: actions/cache@v5
        with:
          path: ~/supabase-docker-images.tar
          key: ${{ runner.os }}-supabase-docker-v2.106.0
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Load Cached Docker Images
        if: steps.cache-docker-images.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-docker-images.tar

      - name: Stop any stale Supabase containers
        working-directory: rhizome
        run: |
          supabase stop --no-backup 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

      - name: Disable Supabase Edge Runtime For CI
        working-directory: rhizome
        run: |
          if grep -q '^\[edge_runtime\]' supabase/config.toml; then
            perl -0pi -e 's/\[edge_runtime\]\s*\nenabled = true/[edge_runtime]\nenabled = false/' supabase/config.toml
          else
            printf '\n[edge_runtime]\nenabled = false\n' >> supabase/config.toml
          fi

      - name: Start Supabase from Rhizome
        working-directory: rhizome
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')"   >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')"   >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Wait for Supabase API
        run: |
          ATTEMPTS=0
          until CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "$SUPABASE_URL/rest/v1" || true) && echo "$CODE" | grep -qE '200|401|404'; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then exit 1; fi
            sleep 2
          done

      - name: Save Docker Images to Cache
        if: steps.cache-docker-images.outputs.cache-hit != 'true'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep supabase | xargs docker save -o ~/supabase-docker-images.tar

      - name: Seed shared auth users (Rhizome)
        working-directory: rhizome
        run: |
          bash ./scripts/seed-shared-auth-users-local.sh
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Apply TuneTrees migrations + seeds (Rhizome db-push)
        working-directory: rhizome
        run: |
          ./scripts/db-push-local.sh --public-cleared ${{ github.workspace }}
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Remove local Supabase bindings from .env.local.template
        # Later npm scripts use `op run --env-file=.env.local.template`. Strip the
        # local Supabase-derived keys so `op run` cannot override the runtime values
        # already exported into $GITHUB_ENV after `supabase start`.
        run: |
          tmp_env_file="$(mktemp)"
          awk '!/^(VITE_SUPABASE_URL|SUPABASE_URL|SUPABASE_ANON_KEY|VITE_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY)=/' .env.local.template > "$tmp_env_file"
          mv "$tmp_env_file" .env.local.template

      # --- Playwright PWA Specifics ---
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Cloudflare Worker
        run: |
          cd worker
          npm ci --ignore-scripts
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          echo "SUPABASE_URL=$SUPABASE_URL" > .dev.vars
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" >> .dev.vars
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> .dev.vars

      - name: Install Playwright Browsers
        # Use the local playwright CLI from @playwright/test to guarantee the
        # binary hash matches the installed package version. Avoids stale-cache
        # false-positives that occur when npx downloads a separate copy and sees
        # no project context.
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Build PWA
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY not set after Supabase start}"
          export VITE_SUPABASE_URL="$SUPABASE_URL"
          export VITE_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          npm run build:preview-local

      - name: Create Playwright output directories
        run: mkdir -p playwright-logs blob-report test-results

      - name: Run PWA Offline Tests
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY not set after Supabase start}"
          export VITE_SUPABASE_URL="$SUPABASE_URL"
          export VITE_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          set -o pipefail
          echo "🚀 Starting Preview Server on port 4173..."
          npm run preview:local &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID" 2>/dev/null || true
            pkill -f "vite preview" 2>/dev/null || true
          }
          trap cleanup EXIT

          ATTEMPTS=0
          until curl -fsS "http://localhost:4173/" > /dev/null; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 60 ]; then
              echo "❌ Preview server did not become ready in time"
              exit 1
            fi
            sleep 1
          done

          echo "🎭 Running PWA Offline Tests..."
          npm run test:e2e:offline:ci -- \
            2>&1 | tee "playwright-logs/playwright-pwa.log"
        shell: bash

      - name: Upload Playwright log (PWA)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-log-pwa
          path: playwright-logs/
          retention-days: 7

      - name: Upload PWA blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-pwa
          path: blob-report/
          retention-days: 1

      - name: Upload Test Artifacts (PWA)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-pwa
          path: test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: cd rhizome && supabase stop --no-backup

  # --------------------------------------------------------------------------
  # JOB 4: MERGE REPORTS
  # --------------------------------------------------------------------------
  merge-reports:
    name: Merge Playwright Reports
    if: always()
    needs: [test, test-pwa-offline]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Detect blob reports
        id: blob-reports
        run: |
          if [ -d all-blob-reports ] && find all-blob-reports -type f -name '*.zip' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Playwright blob reports were downloaded; skipping HTML merge."
          fi

      - name: Download Playwright logs
        uses: actions/download-artifact@v8
        with:
          pattern: playwright-log-*
          path: all-playwright-logs
          merge-multiple: true

      - name: Assemble combined Playwright log
        run: |
          mkdir -p playwright-logs
          cat all-playwright-logs/*.log > playwright-logs/playwright-combined.log 2>/dev/null || echo "(no log files)" > playwright-logs/playwright-combined.log

      - name: Upload combined Playwright log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-log-combined
          path: playwright-logs/
          retention-days: 7

      - name: Merge into HTML Report
        if: steps.blob-reports.outputs.found == 'true'
        run: node_modules/.bin/playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        if: steps.blob-reports.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # --------------------------------------------------------------------------
  # JOB 5: STAGING DEPLOY + DATA REFRESH + SMOKE TESTS
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy staging and verify
    runs-on: ubuntu-latest
    needs: [test-unit, test, test-pwa-offline]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    environment: tunetrees_ci_env
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      RHIZOME_REPO_PATH: ${{ github.workspace }}/rhizome

    steps:
      # Pinned to a full commit SHA (not @v5) because this job has access to
      # deploy secrets via 1Password; persist-credentials: false so the token
      # is not left on disk for subsequent steps or a compromised action to read.
      - name: Checkout TuneTrees
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Resolve shared repo refs
        id: shared_refs
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          has_remote_branch() {
            local repo="$1"
            local branch="$2"
            git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$branch" >/dev/null 2>&1
          }

          repo_prefix() {
            case "$1" in
              sboagy/tunetrees) printf 'tt' ;;
              sboagy/cubefsrs) printf 'cf' ;;
              sboagy/oosync) printf 'os' ;;
              sboagy/rhizome) printf 'rz' ;;
              *) return 1 ;;
            esac
          }

          resolve_ref() {
            local repo="$1"
            local candidate="$2"
            local target_prefix
            local shared_suffix
            local prefixed_candidate

            if has_remote_branch "$repo" "$candidate"; then
              printf '%s\n' "$candidate"
              return
            fi

            target_prefix="$(repo_prefix "$repo")" || {
              printf 'main\n'
              return
            }

            shared_suffix="$candidate"
            case "$candidate" in
              tt-*|cf-*|os-*|rz-*)
                shared_suffix="${candidate#*-}"
                ;;
            esac

            prefixed_candidate="${target_prefix}-${shared_suffix}"
            if has_remote_branch "$repo" "$prefixed_candidate"; then
              printf '%s\n' "$prefixed_candidate"
              return
            fi

            printf 'main\n'
          }

          echo "rhizome_ref=$(resolve_ref sboagy/rhizome "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"
          echo "oosync_ref=$(resolve_ref sboagy/oosync "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"

      # Also SHA-pinned with persist-credentials: false (deploy job).
      - name: Checkout rhizome (shared Supabase config + DB scripts)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: sboagy/rhizome
          ref: ${{ steps.shared_refs.outputs.rhizome_ref }}
          path: rhizome
          persist-credentials: false

      # Also SHA-pinned with persist-credentials: false (deploy job).
      - name: Checkout oosync
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: sboagy/oosync
          ref: ${{ steps.shared_refs.outputs.oosync_ref }}
          path: oosync
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Worker Dependencies
        run: npm ci --prefix worker --ignore-scripts

      - name: Link checked-out oosync package
        run: |
          # Both installs are already locked by npm ci. Replace only the oosync
          # package source rather than asking npm to resolve a new dependency tree.
          rm -rf node_modules/oosync worker/node_modules/oosync
          ln -s "$GITHUB_WORKSPACE/oosync" node_modules/oosync
          ln -s "$GITHUB_WORKSPACE/oosync" worker/node_modules/oosync

      - name: Log oosync overlay versions
        run: |
          echo "oosync source SHA: $(git -C oosync rev-parse HEAD)"
          node -e '
            const fs = require("node:fs");
            for (const [packageName, manifestPath] of Object.entries({
              oosync: "node_modules/oosync/package.json",
              "@sqlite.org/sqlite-wasm": "node_modules/@sqlite.org/sqlite-wasm/package.json",
              "worker oosync": "worker/node_modules/oosync/package.json",
            })) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              console.log(`${packageName}: version=${manifest.version} manifest=${fs.realpathSync(manifestPath)}`);
            }
          '

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71

      - name: Apply staging Supabase migrations
        run: npm run db:staging:schema:push

      - name: Validate generated schema contract against staging
        run: |
          op run --env-file=".env.staging.template" -- sh -c '
            npx tsx node_modules/oosync/src/codegen-schema.ts \
              --check \
              --databaseUrl="$DATABASE_URL"
          '
          npm run typecheck
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Verify staging Worker dry run
        run: npm run worker:deploy:staging:dry-run

      - name: Deploy staging Worker
        run: npm run worker:deploy:staging

      - name: Sync staging rhythm assets from production R2
        run: npm run r2:rhythm-assets:sync:apply

      - name: Apply and verify staging rhythm asset R2 CORS
        run: npm run r2:rhythm-assets:cors:apply

      - name: Build staging Pages bundle
        run: npm run build:staging

      - name: Deploy staging Pages
        run: |
          op run --env-file=".env.staging.template" -- \
            npx wrangler pages deploy dist \
              --project-name=tunetrees-pwa \
              --branch=staging

      - name: Verify staging Pages assets through the public hostname
        run: npm run verify:deployed-pages-assets -- https://staging.tunetrees.com

      - name: Install PostgreSQL 17 client
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_staging_data_refresh != 'true' }}
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Refresh staging data from production
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_staging_data_refresh != 'true' }}
        run: npm run db:staging:refresh

      - name: Install Playwright browser for staging smoke
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Run staging smoke tests
        run: npm run test:e2e:staging

      - name: Create successful staging Deployment record
        run: |
          set -euo pipefail

          deployment_request="$(mktemp)"
          deployment_response="$(mktemp)"

          jq -n \
            --arg ref "${GITHUB_SHA}" \
            --arg environment "staging" \
            --arg description "TuneTrees staging deploy verified by CI" \
            '{ref: $ref, environment: $environment, auto_merge: false, required_contexts: [], description: $description}' \
            > "${deployment_request}"

          if ! gh api "repos/${GITHUB_REPOSITORY}/deployments" \
            --method POST \
            --input "${deployment_request}" \
            > "${deployment_response}"; then
            echo "Failed to create staging Deployment record." >&2
            echo "Confirm this job has job-level permissions.deployments: write and that repository Actions settings allow write tokens." >&2
            jq . "${deployment_response}" >&2 || cat "${deployment_response}" >&2
            exit 1
          fi

          deployment_id="$(jq -r '.id // empty' "${deployment_response}")"
          if [[ -z "${deployment_id}" || ! "${deployment_id}" =~ ^[0-9]+$ ]]; then
            echo "GitHub deployment creation did not return a numeric deployment id." >&2
            jq . "${deployment_response}" >&2 || cat "${deployment_response}" >&2
            exit 1
          fi

          gh api "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
            --method POST \
            -f state="success" \
            -f environment="staging" \
            -f environment_url="https://staging.tunetrees.com" \
            -f log_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description="Staging deploy, data refresh, and smoke tests passed"

          {
            echo "### Staging deployment proof"
            echo
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Deployment ID: \`${deployment_id}\`"
            echo "- Environment: \`staging\`"
            echo "- Status: \`success\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
