# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:line-length
#
# Secrets required in the `tunetrees_ci_env` environment:
#   OP_SERVICE_ACCOUNT_TOKEN  — 1Password Service Account token (for op run)
#
# All other secrets (including test user passwords, Supabase keys, Cloudflare creds)
# are resolved at runtime via `op run` or `op read` using .env.prod.template.
#
# All production secrets (CLOUDFLARE_*, VITE_SUPABASE_URL, etc.) are resolved
# at deploy time via `op run --env-file=".env.prod.template"` so they do NOT
# need to be stored individually as GitHub secrets.

name: CI - Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # <-- This is your manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for all JavaScript actions (required before June 2026 forced migration).
# This silences Node.js 20 deprecation warnings, including 1password/install-cli-action@v2
# which has no Node 24-native release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # vite-plugin-pwa@1.2.0 still advertises a Vite <=7 peer range even though
  # TuneTrees has been verified to install and build on Vite 8. Keep CI from
  # failing on that stale peer metadata until upstream updates it.
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

jobs:
  # --------------------------------------------------------------------------
  # JOB 0: UNIT TESTS (VITEST)
  # --------------------------------------------------------------------------
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # --------------------------------------------------------------------------
  # JOB 1: PLAYWRIGHT E2E TESTS (Sharded)
  # --------------------------------------------------------------------------
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    timeout-minutes: 60
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      # These override anything from op run for the LOCAL Supabase instance.
      # Values are populated after `supabase start` via $GITHUB_ENV.
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      # Local Supabase service role key (well-known default, not a real secret)
      SUPABASE_SERVICE_ROLE_KEY: super-secret-jwt-token-with-at-least-32-characters-long

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Resolve shared repo refs
        id: shared_refs
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          has_remote_branch() {
            local repo="$1"
            local branch="$2"
            git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$branch" >/dev/null 2>&1
          }

          repo_prefix() {
            case "$1" in
              sboagy/tunetrees) printf 'tt' ;;
              sboagy/cubefsrs) printf 'cf' ;;
              sboagy/oosync) printf 'os' ;;
              sboagy/rhizome) printf 'rz' ;;
              *) return 1 ;;
            esac
          }

          resolve_ref() {
            local repo="$1"
            local candidate="$2"
            local target_prefix
            local shared_suffix
            local prefixed_candidate

            if has_remote_branch "$repo" "$candidate"; then
              printf '%s\n' "$candidate"
              return
            fi

            target_prefix="$(repo_prefix "$repo")" || {
              printf 'main\n'
              return
            }

            shared_suffix="$candidate"
            case "$candidate" in
              tt-*|cf-*|os-*|rz-*)
                shared_suffix="${candidate#*-}"
                ;;
            esac

            prefixed_candidate="${target_prefix}-${shared_suffix}"
            if has_remote_branch "$repo" "$prefixed_candidate"; then
              printf '%s\n' "$prefixed_candidate"
              return
            fi

            printf 'main\n'
          }

          echo "rhizome_ref=$(resolve_ref sboagy/rhizome "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"
          echo "oosync_ref=$(resolve_ref sboagy/oosync "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"

      - name: Checkout Rhizome (shared Supabase config + DB scripts)
        uses: actions/checkout@v5
        with:
          repository: sboagy/rhizome
          ref: ${{ steps.shared_refs.outputs.rhizome_ref }}
          path: rhizome
          # For private repos, add: token: ${{ secrets.GH_PAT }}

      - name: Checkout oosync (sync library for worker)
        uses: actions/checkout@v5
        with:
          repository: sboagy/oosync
          ref: ${{ steps.shared_refs.outputs.oosync_ref }}
          path: oosync
          # For private repos, add: token: ${{ secrets.GH_PAT }}

      - name: AGGRESSIVE DISK CLEANUP
        if: runner.os == 'Linux'
        run: |
          echo "🧹 Removing large pre-installed SDKs..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune -a -f || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Overlay checked-out Rhizome and oosync packages
        run: |
          npm install --no-save --no-package-lock ./rhizome ./oosync

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Resolve test secrets from 1Password
        # Resolves the shared test-user password via 1Password so it is never
        # stored as a GitHub secret. Both env vars point to the same value.
        run: |
          echo "ALICE_TEST_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
          echo "TEST_USER_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # --- Supabase Setup (from Rhizome — the shared multi-tenant instance) ---
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/supabase
          key: ${{ runner.os }}-supabase-cli-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-cli-v1.

      - name: Install Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/supabase-cli
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz -C /tmp/supabase-cli
          sudo mv -f /tmp/supabase-cli/supabase /usr/local/bin/
          rm -rf /tmp/supabase-cli

      - name: Cache Supabase Docker Images
        id: cache-docker-images
        uses: actions/cache@v4
        with:
          path: ~/supabase-docker-images.tar
          key: ${{ runner.os }}-supabase-docker-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Load Cached Docker Images
        if: steps.cache-docker-images.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-docker-images.tar

      - name: Stop any stale Supabase containers
        working-directory: rhizome
        run: |
          supabase stop --no-backup 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

      - name: Disable Supabase Edge Runtime For CI
        working-directory: rhizome
        run: |
          if grep -q '^\[edge_runtime\]' supabase/config.toml; then
            perl -0pi -e 's/\[edge_runtime\]\s*\nenabled = true/[edge_runtime]\nenabled = false/' supabase/config.toml
          else
            printf '\n[edge_runtime]\nenabled = false\n' >> supabase/config.toml
          fi

      - name: Start Supabase from Rhizome
        # Starting from the rhizome directory uses rhizome's supabase/config.toml,
        # which defines the shared multi-tenant project. NEVER run `supabase db reset`
        # here — that would wipe ALL app schemas (TuneTrees + CubeFSRS).
        working-directory: rhizome
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Wait for Supabase API (Health Check)
        run: |
          echo "🔍 Checking Supabase API health at $SUPABASE_URL/rest/v1"
          ATTEMPTS=0
          until CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "$SUPABASE_URL/rest/v1" || true) && echo "$CODE" | grep -qE '200|401|404'; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then exit 1; fi
            sleep 2
          done

      - name: Save Docker Images to Cache
        if: steps.cache-docker-images.outputs.cache-hit != 'true'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep supabase | xargs docker save -o ~/supabase-docker-images.tar

      - name: Seed shared auth users (Rhizome)
        # Creates the shared test user accounts without touching app-specific tables.
        working-directory: rhizome
        run: |
          bash ./scripts/seed-shared-auth-users-local.sh
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Apply TuneTrees migrations + seeds (Rhizome db-push)
        # Applies TuneTrees-specific migrations and seeds via the rhizome orchestration
        # script, which is safe to run against the shared multi-tenant instance.
        working-directory: rhizome
        run: |
          ./scripts/db-push-local.sh --public-cleared ${{ github.workspace }}
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Remove local Supabase bindings from .env.local.template
        # Later npm scripts use `op run --env-file=.env.local.template`. Strip the
        # local Supabase-derived keys so `op run` cannot override the runtime values
        # already exported into $GITHUB_ENV after `supabase start`.
        run: |
          tmp_env_file="$(mktemp)"
          awk '!/^(VITE_SUPABASE_URL|SUPABASE_URL|SUPABASE_ANON_KEY|VITE_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY)=/' .env.local.template > "$tmp_env_file"
          mv "$tmp_env_file" .env.local.template

      - name: Check SQLite schema via Postgres introspection
        if: matrix.shard == 1
        run: npm run schema:sqlite:check

      # --- Playwright Setup ---
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright System Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Setup Cloudflare Worker
        run: |
          cd worker
          npm ci
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          echo "SUPABASE_URL=$SUPABASE_URL" > .dev.vars
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" >> .dev.vars
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> .dev.vars

      - name: Create Playwright output directories
        run: |
          mkdir -p playwright-logs blob-report test-results

      - name: Run Playwright Tests (Shard ${{ matrix.shard }}/4)
        run: |
          set -o pipefail
          echo "🎬 Running sharded test suite (shard ${{ matrix.shard }}/4)"
          npm run test:e2e:both:ci -- \
            --shard=${{ matrix.shard }}/4 \
            2>&1 | tee "playwright-logs/playwright-shard-${{ matrix.shard }}.log"

      - name: Upload Playwright log (Shard ${{ matrix.shard }}/4)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-log-${{ matrix.shard }}
          path: playwright-logs/playwright-shard-${{ matrix.shard }}.log
          retention-days: 7

      - name: Upload blob report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: cd rhizome && supabase stop --no-backup

  # --------------------------------------------------------------------------
  # JOB 2: PWA OFFLINE TEST (Production Build + Preview)
  # --------------------------------------------------------------------------
  test-pwa-offline:
    name: Run PWA Offline Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      SUPABASE_SERVICE_ROLE_KEY: super-secret-jwt-token-with-at-least-32-characters-long

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Resolve shared repo refs
        id: shared_refs
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          has_remote_branch() {
            local repo="$1"
            local branch="$2"
            git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$branch" >/dev/null 2>&1
          }

          repo_prefix() {
            case "$1" in
              sboagy/tunetrees) printf 'tt' ;;
              sboagy/cubefsrs) printf 'cf' ;;
              sboagy/oosync) printf 'os' ;;
              sboagy/rhizome) printf 'rz' ;;
              *) return 1 ;;
            esac
          }

          resolve_ref() {
            local repo="$1"
            local candidate="$2"
            local target_prefix
            local shared_suffix
            local prefixed_candidate

            if has_remote_branch "$repo" "$candidate"; then
              printf '%s\n' "$candidate"
              return
            fi

            target_prefix="$(repo_prefix "$repo")" || {
              printf 'main\n'
              return
            }

            shared_suffix="$candidate"
            case "$candidate" in
              tt-*|cf-*|os-*|rz-*)
                shared_suffix="${candidate#*-}"
                ;;
            esac

            prefixed_candidate="${target_prefix}-${shared_suffix}"
            if has_remote_branch "$repo" "$prefixed_candidate"; then
              printf '%s\n' "$prefixed_candidate"
              return
            fi

            printf 'main\n'
          }

          echo "rhizome_ref=$(resolve_ref sboagy/rhizome "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"
          echo "oosync_ref=$(resolve_ref sboagy/oosync "$CANDIDATE_REF")" >> "$GITHUB_OUTPUT"

      - name: Checkout Rhizome (shared Supabase config + DB scripts)
        uses: actions/checkout@v5
        with:
          repository: sboagy/rhizome
          ref: ${{ steps.shared_refs.outputs.rhizome_ref }}
          path: rhizome

      - name: Checkout oosync (sync library for worker)
        uses: actions/checkout@v5
        with:
          repository: sboagy/oosync
          ref: ${{ steps.shared_refs.outputs.oosync_ref }}
          path: oosync

      - name: AGGRESSIVE DISK CLEANUP
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune -a -f || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Overlay checked-out Rhizome and oosync packages
        run: |
          npm install --no-save --no-package-lock ./rhizome ./oosync

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Resolve test secrets from 1Password
        # Resolves the shared test-user password via 1Password so it is never
        # stored as a GitHub secret. Both env vars point to the same value.
        run: |
          echo "ALICE_TEST_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
          echo "TEST_USER_PASSWORD=$(op read 'op://rhizome/shared-local/Test/ALICE_TEST_PASSWORD')" >> "$GITHUB_ENV"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # --- Supabase Setup (shared multi-tenant from Rhizome) ---
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/supabase
          key: ${{ runner.os }}-supabase-cli-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-cli-v1.

      - name: Install Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/supabase-cli
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz -C /tmp/supabase-cli
          sudo mv -f /tmp/supabase-cli/supabase /usr/local/bin/
          rm -rf /tmp/supabase-cli

      - name: Cache Supabase Docker Images
        id: cache-docker-images
        uses: actions/cache@v4
        with:
          path: ~/supabase-docker-images.tar
          key: ${{ runner.os }}-supabase-docker-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Load Cached Docker Images
        if: steps.cache-docker-images.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-docker-images.tar

      - name: Stop any stale Supabase containers
        working-directory: rhizome
        run: |
          supabase stop --no-backup 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

      - name: Disable Supabase Edge Runtime For CI
        working-directory: rhizome
        run: |
          if grep -q '^\[edge_runtime\]' supabase/config.toml; then
            perl -0pi -e 's/\[edge_runtime\]\s*\nenabled = true/[edge_runtime]\nenabled = false/' supabase/config.toml
          else
            printf '\n[edge_runtime]\nenabled = false\n' >> supabase/config.toml
          fi

      - name: Start Supabase from Rhizome
        working-directory: rhizome
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')"   >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')"   >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Wait for Supabase API
        run: |
          ATTEMPTS=0
          until CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "$SUPABASE_URL/rest/v1" || true) && echo "$CODE" | grep -qE '200|401|404'; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then exit 1; fi
            sleep 2
          done

      - name: Save Docker Images to Cache
        if: steps.cache-docker-images.outputs.cache-hit != 'true'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep supabase | xargs docker save -o ~/supabase-docker-images.tar

      - name: Seed shared auth users (Rhizome)
        working-directory: rhizome
        run: |
          bash ./scripts/seed-shared-auth-users-local.sh
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Apply TuneTrees migrations + seeds (Rhizome db-push)
        working-directory: rhizome
        run: |
          ./scripts/db-push-local.sh --public-cleared ${{ github.workspace }}
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Remove local Supabase bindings from .env.local.template
        # Later npm scripts use `op run --env-file=.env.local.template`. Strip the
        # local Supabase-derived keys so `op run` cannot override the runtime values
        # already exported into $GITHUB_ENV after `supabase start`.
        run: |
          tmp_env_file="$(mktemp)"
          awk '!/^(VITE_SUPABASE_URL|SUPABASE_URL|SUPABASE_ANON_KEY|VITE_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY)=/' .env.local.template > "$tmp_env_file"
          mv "$tmp_env_file" .env.local.template

      # --- Playwright PWA Specifics ---
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Cloudflare Worker
        run: |
          cd worker
          npm ci
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          echo "SUPABASE_URL=$SUPABASE_URL" > .dev.vars
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" >> .dev.vars
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> .dev.vars

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright System Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build PWA
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY not set after Supabase start}"
          export VITE_SUPABASE_URL="$SUPABASE_URL"
          export VITE_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          npm run build:preview-local

      - name: Create Playwright output directories
        run: mkdir -p playwright-logs blob-report test-results

      - name: Run PWA Offline Tests
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL not set after Supabase start}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY not set after Supabase start}"
          export VITE_SUPABASE_URL="$SUPABASE_URL"
          export VITE_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          set -o pipefail
          echo "🚀 Starting Preview Server on port 4173..."
          npm run preview:local &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID" 2>/dev/null || true
            pkill -f "vite preview" 2>/dev/null || true
          }
          trap cleanup EXIT

          ATTEMPTS=0
          until curl -fsS "http://localhost:4173/" > /dev/null; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 60 ]; then
              echo "❌ Preview server did not become ready in time"
              exit 1
            fi
            sleep 1
          done

          echo "🎭 Running PWA Offline Tests..."
          npm run test:e2e:offline:ci -- \
            2>&1 | tee "playwright-logs/playwright-pwa.log"
        shell: bash

      - name: Upload Playwright log (PWA)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-log-pwa
          path: playwright-logs/
          retention-days: 7

      - name: Upload PWA blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-pwa
          path: blob-report/
          retention-days: 1

      - name: Upload Test Artifacts (PWA)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-pwa
          path: test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: cd rhizome && supabase stop --no-backup

  # --------------------------------------------------------------------------
  # JOB 3: MERGE REPORTS
  # --------------------------------------------------------------------------
  merge-reports:
    name: Merge Playwright Reports
    if: always()
    needs: [test, test-pwa-offline]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v6
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Detect blob reports
        id: blob-reports
        run: |
          if [ -d all-blob-reports ] && find all-blob-reports -type f -name '*.zip' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Playwright blob reports were downloaded; skipping HTML merge."
          fi

      - name: Download Playwright logs
        uses: actions/download-artifact@v6
        with:
          pattern: playwright-log-*
          path: all-playwright-logs
          merge-multiple: true

      - name: Assemble combined Playwright log
        run: |
          mkdir -p playwright-logs
          cat all-playwright-logs/*.log > playwright-logs/playwright-combined.log 2>/dev/null || echo "(no log files)" > playwright-logs/playwright-combined.log

      - name: Upload combined Playwright log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-log-combined
          path: playwright-logs/
          retention-days: 7

      - name: Merge into HTML Report
        if: steps.blob-reports.outputs.found == 'true'
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        if: steps.blob-reports.outputs.found == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # --------------------------------------------------------------------------
  # JOB 4: DEPLOY (Pages + Worker)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test-unit, test, test-pwa-offline]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tt_rz_refactor')
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Build Application
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # Use `op run` instead of wrangler-action so secrets come from
        # 1Password and never need to be stored as individual GitHub secrets.
        run: |
          op run --env-file=".env.prod.template" -- \
            npx wrangler pages deploy dist \
              --project-name=tunetrees-pwa \
              --branch=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Output deployment URL
        if: success()
        run: echo "🚀 Deployment complete!"

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [test-unit, test, test-pwa-offline]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tt_rz_refactor')
    environment: tunetrees_ci_env

    steps:
      - name: Checkout TuneTrees
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Worker Dependencies
        run: cd worker && npm ci

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Deploy Worker
        # The worker JWT secret must exist as a Cloudflare Worker secret binding.
        # Loading it into the deploy shell via `op run` is not enough by itself.
        run: npm run deploy
        working-directory: worker
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
