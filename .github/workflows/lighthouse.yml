# Lighthouse CI - Performance Monitoring
# Runs Lighthouse audits on every push to feat/pwa1 branch
# Fails build if performance metrics fall below thresholds

name: Lighthouse CI

on:
  push:
    branches: [feat/pwa1]
  pull_request:
    branches: [main, feat/pwa1]

# Cancel in-progress runs when new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for JavaScript-based actions before the runner default
# changes in June 2026. This also suppresses deprecation warnings from
# 1password/install-cli-action@v2, which still runs on the older action runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    environment: tunetrees_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      - name: Prepare Lighthouse build env
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.env.prod.template')
          old = 'VITE_WORKER_URL="op://rhizome/shared-local/Vite/VITE_WORKER_URL_TUNETREES_PRODUCTION"'
          new = 'VITE_WORKER_URL="https://example.invalid/tunetrees-worker"'
          text = path.read_text()
          if old not in text:
              raise SystemExit('Expected VITE_WORKER_URL production reference was not found in .env.prod.template')
          path.write_text(text.replace(old, new, 1))
          PY

      # 4. Build production bundle
      - name: Build Application
        run: |
          for attempt in 1 2 3; do
            echo "Building application (attempt ${attempt}/3)"
            if npm run build; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Build failed after ${attempt} attempts"
              exit 1
            fi

            echo "Transient build failure; retrying in 15s"
            sleep 15
          done
        env:
          # Use placeholder values for build (not accessing real Supabase)
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build-only
          # Lighthouse audits the static frontend bundle, so a public placeholder
          # worker URL is sufficient here and avoids depending on a missing
          # production-only 1Password field during CI.
          VITE_WORKER_URL: https://example.invalid/tunetrees-worker

      - name: Create Lighthouse output directory
        run: mkdir -p .lighthouseci

      # 5. Run Lighthouse CI
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ github.token }}

      # 6. Upload Lighthouse reports
      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: ignore

      # 7. Comment PR with results (if PR context)
      - name: Comment PR with Lighthouse Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.lighthouseci/manifest.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No Lighthouse manifest found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const reports = manifest.map(report => report.url);

            const comment = `## 🔦 Lighthouse CI Results

            Lighthouse audits have been completed. View reports:
            ${reports.map((url, i) => `- [Report ${i + 1}](${url})`).join('\n')}

            **Performance Targets:**
            - ✅ FCP < 1.5s
            - ✅ LCP < 2.5s
            - ✅ TTI < 3.0s
            - ✅ TBT < 300ms
            - ✅ CLS < 0.1

            See workflow artifacts for detailed reports.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
