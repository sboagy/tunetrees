name: SonarQube Cloud Analysis

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read

jobs:
    sonarcloud:
        name: SonarQube Cloud Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

            - name: Install 1Password CLI
              uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: |
                      package-lock.json
                      worker/package-lock.json

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Run unit tests
              run: npm run test:withcoverage

            - name: SonarQube Scan
              uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, token generated automatically by GitHub
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
